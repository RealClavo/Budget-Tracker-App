<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b5fff">
<meta name="description" content="CashControl is een offline budget tracker voor inkomsten, uitgaven, doelen, statistieken en vakantiewisselkoersen.">
<title>Add Transaction | CashControl</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/icon-192.png">
<link rel="stylesheet" href="./css/themes.css">
<link rel="stylesheet" href="./css/style.css">
<script src="./js/storage.js" defer></script>
<script src="./js/theme.js" defer></script>
<script src="./js/calculations.js" defer></script>
<script src="./js/budget.js" defer></script>
<script src="./js/transactions.js" defer></script>
<script src="./js/statistics.js" defer></script>
<script src="./js/currency.js" defer></script>
<script src="./js/i18n.js" defer></script>
<script src="./js/settings.js" defer></script>
<script src="./js/pwa.js" defer></script>
<script src="./js/app.js" defer></script>

  </head>
  <body data-page="add">
    <header class="app-header">
  <a class="skip-link" href="#main-content" data-i18n="a11y.skip">Spring naar inhoud</a>
  <div class="brand">
    <span class="brand-mark" aria-hidden="true">C</span>
    <div>
      <p class="brand-eyebrow" data-i18n="app.subtitle">Budget tracker</p>
      <h1>CashControl</h1>
    </div>
  </div>
  <div class="header-actions" aria-label="App instellingen">
    <button class="icon-button" type="button" data-theme-toggle aria-label="Thema wisselen" title="Thema wisselen">
      <span class="icon icon-theme" aria-hidden="true"></span>
    </button>
    <a class="icon-button" href="./settings.html" aria-label="Instellingen" title="Instellingen">
      <span class="icon icon-settings" aria-hidden="true"></span>
    </a>
  </div>
</header>

    <nav class="app-nav" aria-label="Hoofdnavigatie">
  
    <a class="nav-link " href="./index.html" data-page-link="dashboard">
      <span class="nav-icon nav-icon-home" aria-hidden="true"></span>
      <span data-i18n="nav.dashboard">Dashboard</span>
    </a>
  
    <a class="nav-link is-active" href="./add.html" data-page-link="add">
      <span class="nav-icon nav-icon-plus" aria-hidden="true"></span>
      <span data-i18n="nav.add">Add Transaction</span>
    </a>
  
    <a class="nav-link " href="./overview.html" data-page-link="overview">
      <span class="nav-icon nav-icon-list" aria-hidden="true"></span>
      <span data-i18n="nav.overview">Overview</span>
    </a>
  
    <a class="nav-link " href="./calculator.html" data-page-link="calculator">
      <span class="nav-icon nav-icon-calculator" aria-hidden="true"></span>
      <span data-i18n="nav.calculator">Budget Calculator</span>
    </a>
  
    <a class="nav-link " href="./statistics.html" data-page-link="statistics">
      <span class="nav-icon nav-icon-chart" aria-hidden="true"></span>
      <span data-i18n="nav.statistics">Statistics</span>
    </a>
  
    <a class="nav-link " href="./converter.html" data-page-link="converter">
      <span class="nav-icon nav-icon-exchange" aria-hidden="true"></span>
      <span data-i18n="nav.converter">Currency Converter</span>
    </a>
  
    <a class="nav-link " href="./settings.html" data-page-link="settings">
      <span class="nav-icon nav-icon-settings" aria-hidden="true"></span>
      <span data-i18n="nav.settings">Settings</span>
    </a>
  
</nav>

    <main class="app-main" id="main-content" tabindex="-1">
      <section class="page-hero" aria-labelledby="add-title">
  <div>
    <p class="section-kicker" data-i18n="pages.add.kicker">Nieuwe invoer</p>
    <h2 id="add-title" data-i18n="pages.add.title">Transactie toevoegen</h2>
  </div>
</section>

<section class="panel form-panel">
  <form class="stacked-form" data-transaction-form novalidate>
    <div class="form-grid">
      <label>
        <span data-i18n="form.date">Datum</span>
        <input type="date" name="date" required>
      </label>

      <fieldset>
        <legend data-i18n="form.type">Type</legend>
        <div class="segmented-control">
          <label>
            <input type="radio" name="type" value="income" required>
            <span data-i18n="types.income">Inkomst</span>
          </label>
          <label>
            <input type="radio" name="type" value="expense" checked required>
            <span data-i18n="types.expense">Uitgave</span>
          </label>
        </div>
      </fieldset>

      <label>
        <span data-i18n="form.category">Categorie</span>
        <select name="category" required data-category-select></select>
      </label>

      <label>
        <span data-i18n="form.currency">Valuta</span>
        <select name="currency" required data-currency-select></select>
      </label>

      <label class="form-span">
        <span data-i18n="form.description">Omschrijving</span>
        <input type="text" name="description" maxlength="80" autocomplete="off" required>
      </label>

      <label>
        <span data-i18n="form.amount">Bedrag</span>
        <input type="number" name="amount" min="0.01" step="0.01" inputmode="decimal" required>
      </label>
    </div>

    <div class="form-actions">
      <button class="button button-primary" type="submit" data-i18n="actions.saveTransaction">Transactie opslaan</button>
      <button class="button button-secondary" type="reset" data-i18n="actions.resetForm">Formulier wissen</button>
    </div>
    <p class="form-status" data-form-status aria-live="polite"></p>
  </form>
</section>

    </main>
    <footer class="app-footer">
  <span>CashControl</span>
  <span data-i18n="footer.localFirst">Lokaal opgeslagen, offline klaar.</span>
</footer>

  </body>
</html>
